name: Bug report (UI, install, other)
description: Something broken that is not mainly a failed delete/search run (panel, buttons, layout, install, autofill).
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report a **general bug** (UI, installation, token autofill UI, window layout, media gallery, checkpoints, etc.).

        For **deletion stopped / 403 / 429 / empty pages / fingerprint**, use **Deletion / search not working** instead — that template asks for log excerpts.

        > **Do not paste your Discord token** or full authorization headers.

  - type: input
    id: version
    attributes:
      label: Script version
      placeholder: "1.4.0"
    validations:
      required: true

  - type: input
    id: manager
    attributes:
      label: Userscript manager
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Short summary
      description: One sentence describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps from opening Discord to seeing the bug.
      placeholder: |
        1. Install script from official raw link
        2. Open discord.com/app, open trash panel
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      options:
        - Trash button / opening panel
        - Sidebar / form fields
        - Main panel (toolbar, fingerprint bar, log, footer)
        - Account token vault
        - Media review gallery / GM_download saves
        - Server wipe / checkpoint resume
        - Privacy mode / copy log
        - Script install / update / permissions
        - Other
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag images into the comment after submit, or describe what you see. Blur tokens and IDs if Privacy mode was off.
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Browser console errors (optional)
      description: F12 → Console — copy red errors that mention undiscord or userscript. No token lines.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: reproduced
    attributes:
      label: Can you reproduce it?
      options:
        - Yes, every time
        - Sometimes
        - Only once
        - Not tried again
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: false
        - label: I am using the official script from this repository
          required: true
        - label: I did not paste my Discord token in this report
          required: true
